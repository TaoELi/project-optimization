schema_version: 1
benchmark_id: lammps-tip4p-water-nve-v1
package_id: lammps
repo:
  editable_paths:
    - src/**/pair_lj_cut_tip4p*.cpp
    - src/**/pair_lj_cut_tip4p*.h
    - src/**/neighbor*.cpp
    - src/**/verlet*.cpp
    - src/**/integrate*.cpp
    - src/**/atom*.cpp
    - src/**/comm*.cpp
    - src/**/domain*.cpp
  immutable_paths:
    - .fermilink-optimize/**
    - skills/**
    - examples/**
    - unittest/**
    - cmake/**
campaign:
  max_iterations: 120
  stop_on_consecutive_rejections: 30
worker:
  max_iterations: 8
  wait_seconds: 1
controller:
  timeout_seconds: 1800
  warmup_runs: 1
  measured_runs: 3
  objective:
    primary_metric: weighted_median_wall_seconds_per_100_steps
    direction: minimize
    min_relative_improvement: 0.02
  reject_on:
    - crash
    - timeout
    - missing_metrics
    - correctness_failure
correctness:
  mode: field_tolerances
  field_tolerances:
    - field: thermo.etotal
      relative_delta: 1.0e-7
    - field: thermo.pe
      relative_delta: 1.0e-7
    - field: thermo.ke
      relative_delta: 1.0e-7
    - field: thermo.press
      relative_delta: 1.0e-5
    - field: atom_count
      abs_delta: 0.0
    - field: nan_inf_count
      abs_delta: 0.0
runtime:
  mode: direct
  pre_commands:
    - - bash
      - -lc
      - mkdir -p build && cd build && cmake -C ../cmake/presets/most.cmake -C ../cmake/presets/nolib.cmake -D PKG_GPU=off ../cmake && make -j 4
  command:
    - python3
    - .fermilink-optimize/autogen/benchmark_runner.py
    - --benchmark
    - "{benchmark}"
    - --emit-json
  env:
    OMP_NUM_THREADS: "1"
    OPENBLAS_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
    NUMEXPR_NUM_THREADS: "1"
    FERMILINK_GOAL_INPUT_ROOT: .fermilink-optimize/inputs/all
split:
  train_case_ids:
    - train-small
cases:
  - id: train-small
    weight: 0.7
    input_script: in.tip4p_nve
    data_file: water_216_data.lmp
    mpi_ranks: 1
    omp_num_threads: 1
    repeats: 7
    warmup_repeats: 2
    timeout_seconds: 600
  - id: train-small-repeat
    weight: 0.1
    input_script: in.tip4p_nve
    data_file: water_216_data.lmp
    mpi_ranks: 1
    omp_num_threads: 1
    repeats: 5
    warmup_repeats: 1
    timeout_seconds: 600
  - id: test-long
    weight: 0.2
    input_script: in.tip4p_nve_long
    data_file: water_216_data.lmp
    mpi_ranks: 1
    omp_num_threads: 1
    repeats: 3
    warmup_repeats: 1
    timeout_seconds: 900
